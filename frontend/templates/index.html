<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiasLens Analyzer</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
        }
        textarea {
            width: 98%;
            height: 150px;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #results {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #eee;
            background-color: #e9e9e9;
            border-radius: 4px;
            white-space: pre-wrap; /* So that JSON formatting is preserved */
            word-wrap: break-word;
        }
        .loader {
            border: 5px solid #f3f3f3; /* Light grey */
            border-top: 5px solid #3498db; /* Blue */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none; /* Hidden by default */
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BiasLens Text Analyzer</h1>
        <textarea id="textToAnalyze" placeholder="Enter text here..."></textarea>
        <button onclick="analyzeText()">Analyze Text</button>
        <div class="loader" id="loader"></div>
        <h2>Results:</h2>
        <pre id="results">Analysis results will appear here.</pre>
    </div>

    <script>
        async function analyzeText() {
            const text = document.getElementById('textToAnalyze').value;
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');

            if (!text.trim()) {
                resultsDiv.textContent = 'Please enter some text to analyze.';
                return;
            }

            resultsDiv.textContent = 'Analyzing...';
            loader.style.display = 'block'; // Show loader

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text: text }),
                });

                loader.style.display = 'none'; // Hide loader

                if (!response.ok) {
                    const errorResult = await response.json();
                    resultsDiv.textContent = `Error: ${response.status} ${response.statusText}\n${JSON.stringify(errorResult, null, 2)}`;
                    return;
                }

                const data = await response.json();
                resultsDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                loader.style.display = 'none'; // Hide loader
                resultsDiv.textContent = 'Failed to fetch results. Check the console for more details. Error: ' + error;
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
